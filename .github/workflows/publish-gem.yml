name: Publish gem

on:
  release:
    types: [ published ]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby-3.4.9
          bundler-cache: true

      - uses: rubygems/release-gem@v1
        with:
          release-command: bundle exec rake build release:rubygem_push
